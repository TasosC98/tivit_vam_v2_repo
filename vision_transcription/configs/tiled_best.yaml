# Pinned "best results" experiment for PianoVAM visual transcription.
# This is the tiled / per-key ROI model at full key resolution (warp_width=1408
# -> one CNN feature column per key), which roughly doubled F1 vs the 896-wide
# strip in our tests. Run it with:
#   CONFIG=configs/tiled_best.yaml bash scripts/run_experiment.sh tiled_best tiled
#
# Server profile (paths + cpu/gpu) is auto-selected by hostname, same as default.
profile: auto
profiles:
  dit:                         # CPU server
    hostname: vdcloud
    overrides:
      data.root: /home/mkoziri/datasets/PianoVAM_v1.0
      train.device: cpu
  dib:                         # GPU server
    hostname: gondor
    overrides:
      data.root: /raid_storage/data_achatzigiannis/PianoVAM_v1.0
      train.device: cuda

data:
  root: /raid_storage/data_achatzigiannis/PianoVAM_v1.0
  metadata: metadata_v2.json
  video_dir: Video
  tsv_dir: TSV
  midi_dir: MIDI
  video_ext: .mp4
  train_splits: [train, ext-train]
  valid_splits: [valid]
  test_splits:  [test]
  exclude_records: ["2024-09-05_21-37-08"]   # corrupt video (won't decode)

keyboard:
  warp_width: 1408            # 1408/16 = 88 feature columns -> one ROI per key
  warp_height: 112
  grayscale: false
  decode_height: 360          # decode resolution (RAM/speed); 0 = full 1080p
  read_chunk: 8

labels:
  fps: 30.0
  pitch_min: 21
  pitch_max: 108
  offset_field: key_offset    # visual key release (what a camera can see)
  onset_window_frames: 2
  min_note_frames: 1

model:
  arch: tiled                 # per-key ROI architecture (the winner)
  encoder_channels: [32, 64, 128, 192]
  feature_dim: 256
  gru_hidden: 256
  gru_layers: 2
  dropout: 0.2
  use_velocity: false
  tile_feature_dim: 64        # per-key embedding width
  tile_gru_hidden: 128        # per-key temporal hidden

train:
  clip_len: 32
  clip_hop: 16
  batch_size: 8
  num_workers: 2              # 0 = ultra-safe; raise to 4 on a healthy box for speed
  max_open_readers: 2
  max_cached_targets: 8
  epochs: 20
  lr: 0.0006
  weight_decay: 0.0001
  amp: true
  grad_clip: 3.0
  onset_pos_weight: 8.0       # onsets are sparse; calibrate thresholds afterwards
  frame_pos_weight: 2.0
  velocity_loss_weight: 1.0
  log_every: 20
  eval_every_epochs: 1
  seed: 1234
  out_dir: runs/tiled_best
  device: auto
  # 600 frames/recording (~20 s) is the proven subset. Raise for more data (and
  # longer epochs); 0 = full videos (best data, but very long on one GPU).
  max_frames_per_record: 600

decode:
  onset_threshold: 0.5        # calibrate these on valid after training (see below)
  frame_threshold: 0.5
  default_velocity: 80
  min_duration_s: 0.03

infer:
  window_frames: 512
  window_hop: 448
